<footer class="footer">
  <div class="footer__container">
    <div class="footer__row">
      <div class="footer__copy-and-legal">
        <span class="footer__copyright">&copy; {{ currentYear }} Agustín Giró. {{ 'FOOTER_RIGHTS' | translate }}</span>
        <span class="footer__legal-sep">|</span>
        <a href="#" class="footer__legal-link">{{ 'FOOTER_PRIVACY' | translate }}</a>
        <span class="footer__legal-sep">|</span>
        <a href="#" class="footer__legal-link">{{ 'FOOTER_COOKIES' | translate }}</a>

            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>

            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>

        <a href="#" target="_blank" rel="noopener noreferrer" class="footer__social-link" aria-label="LinkedIn">

            <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
            <rect x="2" y="9" width="4" height="12"/>

    </div>
