<section class="projects-carousel" *ngIf="!isLoading && carouselProjects.length > 0">
  <div class="carousel-container">
    <div class="carousel-slides" [style.transform]="'translateX(-' + (currentSlide * 100) + '%)'">
      <div
        class="carousel-slide"
        *ngFor="let project of carouselProjects">
        <img
          class="carousel-slide__image"
          [class.carousel-slide__image--grayscale]="project.grayscale"
          [src]="project.image"
          [alt]="titleFor(project)"
          loading="lazy">
        <div class="carousel-slide__overlay"></div>
        <div class="carousel-slide__content" [routerLink]="['/proyectos', project.id]">
          <div class="carousel-slide__info">
            <h2 class="carousel-slide__title">{{ titleFor(project) }}</h2>
            <p class="carousel-slide__subtitle" *ngIf="subtitleFor(project)">{{ subtitleFor(project) }}</p>
            <div class="carousel-slide__meta">
              <span class="carousel-slide__category" *ngIf="project.category">
                {{ ('PROJECT_CATEGORY_' + project.category) | translate }}
              </span>
              <span class="carousel-slide__separator" *ngIf="project.category && project.status">|</span>
              <span class="carousel-slide__status" *ngIf="project.status">
                {{ ('STATUS_' + project.status) | translate }}
              </span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Dots indicator -->
    <div class="carousel-dots">
      <button
        *ngFor="let project of carouselProjects; let i = index"
        class="carousel-dot"
        [class.carousel-dot--active]="i === currentSlide"
        (click)="goToSlide(i)"
        [attr.aria-label]="('HOME_GO_TO' | translate) + ' ' + titleFor(project)">
      </button>
    </div>
  </div>
</section>

<div class="loading" *ngIf="isLoading">
  <div class="container">
    <p>{{ 'HOME_LOADING' | translate }}</p>
  </div>
</div>
