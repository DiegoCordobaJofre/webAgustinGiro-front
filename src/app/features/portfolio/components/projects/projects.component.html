<section class="section projects-page">
  <div class="container">
    <div class="filters">
      <button
        class="filter-btn"
        [class.filter-btn--active]="selectedGroup === 'OWN'"
        (click)="filterByGroup('OWN')">
        {{ 'PROJECTS_OWN' | translate }}
      </button>
      <button
        class="filter-btn"
        [class.filter-btn--active]="selectedGroup === 'COLLABORATION'"
        (click)="filterByGroup('COLLABORATION')">
        {{ 'PROJECTS_COLLABORATIONS' | translate }}
      </button>
    </div>

    <div class="projects-grid" *ngIf="!isLoading; else loading">
      <article class="project-card" *ngFor="let project of getFilteredProjects()" [routerLink]="['/proyectos', project.id]">
        <div class="project-card__image">
          <img [src]="getMainImage(project)" [alt]="titleFor(project)" loading="lazy">
        </div>
        <div class="project-card__content">
          <h3 class="project-card__title">{{ titleFor(project) }}</h3>
          <span class="project-card__status" *ngIf="project.status">
            {{ ('STATUS_' + project.status) | translate }}
          </span>
        </div>
      </article>
    </div>
    
    <ng-template #loading>
      <div class="loading">{{ 'PROJECTS_LOADING' | translate }}</div>
    </ng-template>
  </div>
</section>
